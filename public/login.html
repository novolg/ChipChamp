<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>ChipChamp — Sign in</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext x='16' y='28' font-size='34' text-anchor='middle' fill='%23006efd'%3E%E2%99%A0%3C/text%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --c-bg: #0d0d14;
        --c-surface-2: #1d1d2a;
        --c-surface-sunken: #14141e;
        --c-sunken-edge: #0a0a12;
        --c-border-2: #2a2a38;
        --c-text: #e8eaf0;
        --c-text-muted: #8e90a6;
        --c-text-faint: #6f7186;
        --c-blue: #006efd;
        --c-blue-grad: linear-gradient(180deg, #3088ff 0%, #006efd 52%, #0052cc 100%);
        --c-blue-edge: #0048b0;
        --c-blue-text: #3b8fff;
        --c-red: #ff4757;
        --r-panel: 16px;
        --r-btn: 12px;
        --font-ui: 'Kanit', system-ui, sans-serif;
        --sh-panel: 0 6px 0 #101018, inset 0 1px 0 rgba(255, 255, 255, 0.05),
          0 24px 60px rgba(0, 0, 0, 0.5);
        --sh-btn-blue: 0 4px 0 var(--c-blue-edge), 0 10px 22px rgba(0, 110, 253, 0.34);
        --grid-dots: radial-gradient(rgba(255, 255, 255, 0.022) 1px, transparent 1px);
      }

      * { box-sizing: border-box; }

      html, body { height: 100%; }

      body {
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: var(--font-ui);
        color: var(--c-text);
        background-color: var(--c-bg);
        background-image: radial-gradient(
            760px 420px at 50% -6%,
            rgba(0, 110, 253, 0.16),
            transparent 70%
          ),
          var(--grid-dots);
        background-size: 100% 100%, 20px 20px;
      }

      .card {
        width: 100%;
        max-width: 384px;
        padding: 40px 34px 30px;
        text-align: center;
        background: var(--c-surface-2);
        border: 1px solid var(--c-border-2);
        border-radius: var(--r-panel);
        box-shadow: var(--sh-panel);
        animation: rise 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) both;
      }

      @keyframes rise {
        from { opacity: 0; transform: translateY(14px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .logo {
        width: 188px;
        max-width: 70%;
        height: auto;
        margin: 0 auto 10px;
        display: block;
        filter: drop-shadow(0 4px 14px rgba(0, 110, 253, 0.28));
      }

      .tagline {
        margin: 0 0 26px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--c-text-faint);
      }

      .prompt {
        margin: 0 0 18px;
        font-size: 15px;
        font-weight: 500;
        color: var(--c-text-muted);
      }

      .error {
        display: none;
        align-items: center;
        justify-content: center;
        gap: 6px;
        margin: 0 0 16px;
        padding: 9px 12px;
        font-size: 13px;
        font-weight: 500;
        color: var(--c-red);
        background: rgba(255, 71, 87, 0.1);
        border: 1px solid rgba(255, 71, 87, 0.3);
        border-radius: 10px;
      }
      .error.show { display: flex; }

      .field { position: relative; }

      input {
        width: 100%;
        padding: 14px 16px;
        font-family: var(--font-ui);
        font-size: 15px;
        font-weight: 500;
        color: var(--c-text);
        background: var(--c-surface-sunken);
        border: 1px solid var(--c-border-2);
        border-radius: var(--r-btn);
        box-shadow: inset 0 2px 0 var(--c-sunken-edge);
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      input::placeholder { color: var(--c-text-faint); }
      input:focus {
        border-color: var(--c-blue);
        box-shadow: inset 0 2px 0 var(--c-sunken-edge), 0 0 0 3px rgba(0, 110, 253, 0.22);
      }

      button {
        width: 100%;
        margin-top: 14px;
        padding: 14px;
        font-family: var(--font-ui);
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: #fff;
        background: var(--c-blue-grad);
        border: none;
        border-radius: var(--r-btn);
        box-shadow: var(--sh-btn-blue);
        cursor: pointer;
        transition: transform 0.09s ease, box-shadow 0.09s ease, filter 0.15s ease;
      }
      button:hover { filter: brightness(1.06); }
      button:active {
        transform: translateY(3px);
        box-shadow: 0 1px 0 var(--c-blue-edge), 0 4px 10px rgba(0, 110, 253, 0.28);
      }

      .footnote {
        margin: 22px 0 0;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.04em;
        color: var(--c-text-faint);
      }
    </style>
  </head>
  <body>
    <form class="card" action="/api/login" method="POST">
      <img class="logo" src="/assets/logo-wordmark.png" alt="ChipChamp" />
      <p class="tagline">Learn Texas Hold'em</p>

      <p class="prompt">Enter the password to take a seat.</p>
      <p class="error" id="error">&#9888; Incorrect password — try again.</p>

      <div class="field">
        <input
          type="password"
          name="password"
          placeholder="Password"
          autocomplete="current-password"
          autofocus
          required
        />
      </div>
      <button type="submit">Enter the table</button>

      <p class="footnote">&#9824; Private practice table</p>
    </form>

    <script>
      if (new URLSearchParams(location.search).has('error')) {
        document.getElementById('error').classList.add('show');
      }
    </script>
  </body>
</html>
