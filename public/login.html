<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>ChipChamp — Sign in</title>
    <style>
      :root {
        --bg: #0d1117;
        --card: #161b22;
        --border: #283040;
        --brand: #2f81f7;
        --text: #e6edf3;
        --muted: #8b949e;
        --error: #f85149;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .card {
        width: 100%;
        max-width: 360px;
        margin: 24px;
        padding: 32px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        text-align: center;
      }
      .spade { font-size: 40px; color: var(--brand); line-height: 1; }
      h1 { margin: 12px 0 4px; font-size: 22px; }
      p.sub { margin: 0 0 24px; color: var(--muted); font-size: 14px; }
      input {
        width: 100%;
        padding: 12px 14px;
        font-size: 15px;
        color: var(--text);
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        outline: none;
      }
      input:focus { border-color: var(--brand); }
      button {
        width: 100%;
        margin-top: 12px;
        padding: 12px;
        font-size: 15px;
        font-weight: 600;
        color: #fff;
        background: var(--brand);
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
      button:hover { filter: brightness(1.08); }
      .error { margin: 0 0 12px; color: var(--error); font-size: 13px; display: none; }
      .error.show { display: block; }
    </style>
  </head>
  <body>
    <form class="card" action="/api/login" method="POST">
      <div class="spade">&#9824;</div>
      <h1>ChipChamp</h1>
      <p class="sub">Enter the password to play.</p>
      <p class="error" id="error">Incorrect password. Try again.</p>
      <input
        type="password"
        name="password"
        placeholder="Password"
        autocomplete="current-password"
        autofocus
        required
      />
      <button type="submit">Enter</button>
    </form>
    <script>
      if (new URLSearchParams(location.search).has('error')) {
        document.getElementById('error').classList.add('show');
      }
    </script>
  </body>
</html>
